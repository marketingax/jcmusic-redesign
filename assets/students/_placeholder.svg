<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Silhouette -->
  <g fill="url(#gold)" opacity="0.85">
    <circle cx="300" cy="230" r="90"/>
    <path d="M150,540 C150,420 220,360 300,360 C380,360 450,420 450,540 Z"/>
  </g>
  <!-- Music note bottom-right -->
  <g fill="url(#gold)" opacity="0.35">
    <circle cx="470" cy="490" r="22"/>
    <rect x="488" y="395" width="6" height="98"/>
    <path d="M488,395 C520,400 535,415 535,440 L488,432 Z"/>
  </g>
  <!-- Frame -->
  <rect x="4" y="4" width="592" height="592" fill="none" stroke="url(#gold)" stroke-opacity="0.4" stroke-width="2"/>
</svg>
