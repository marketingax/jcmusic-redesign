<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JC Music | Student Portal</title>
<link rel="icon" type="image/png" href="../favicon.png">
<style>
:root{
  --gold:#D4AF37;--gold-bright:#FFD700;--black:#0A0A0A;--dark:#1A1A1A;
  --grey:#333;--card:#161616;--text:#F5F5F5;--dim:#A0A0A0;--line:rgba(212,175,55,.15);
  --green:#2ecc71;--red:#ff5a5a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.55;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none!important;}

.wrap{max-width:860px;margin:0 auto;padding:24px 20px 60px;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 0 24px;border-bottom:1px solid var(--line);margin-bottom:28px;}
.topbar img{height:48px;}
.topbar .who{font-size:.85rem;color:var(--dim);}
.btn-out{background:transparent;border:1px solid var(--grey);color:var(--dim);padding:8px 14px;border-radius:6px;font-weight:600;font-size:.82rem;}
.btn-out:hover{border-color:var(--red);color:var(--red);}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--dark);border:1px solid var(--gold);border-radius:14px;padding:46px 38px;max-width:400px;width:100%;text-align:center;}
.login-card img{height:60px;margin-bottom:18px;}
.login-card h1{font-size:1.35rem;margin-bottom:6px;}
.login-card p{color:var(--dim);font-size:.9rem;margin-bottom:24px;}
.login-card input{width:100%;padding:13px;background:var(--black);border:1px solid var(--grey);border-radius:7px;color:var(--text);font-size:1rem;margin-bottom:14px;}
.login-card input:focus{outline:none;border-color:var(--gold);}
.btn-gold{background:linear-gradient(45deg,var(--gold),var(--gold-bright));color:var(--black);border:none;padding:13px 22px;border-radius:7px;font-weight:700;width:100%;font-size:1rem;}
.btn-gold:hover{filter:brightness(1.08);}
.btn-gold:disabled{opacity:.6;cursor:default;}
.note{font-size:.85rem;min-height:20px;margin-top:10px;}
.note.ok{color:var(--green);}
.note.err{color:var(--red);}

h2{font-size:1.2rem;margin-bottom:14px;color:var(--gold);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;}
.stat .label{color:var(--dim);font-size:.76rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.stat .value{font-size:1.7rem;font-weight:700;color:var(--gold);}

.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:22px;}
.tbl{width:100%;border-collapse:collapse;font-size:.88rem;}
.tbl th{text-align:left;color:var(--dim);text-transform:uppercase;font-size:.7rem;letter-spacing:1px;padding:10px 10px;border-bottom:1px solid var(--line);}
.tbl td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
.muted{color:var(--dim);}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:capitalize;}
.pill.paid{background:rgba(46,204,113,.15);color:var(--green);}
.pill.due{background:rgba(212,175,55,.15);color:var(--gold);}
.pill.void{background:rgba(255,90,90,.15);color:var(--red);}
.btn-pay{background:var(--gold);color:var(--black);border:none;padding:7px 14px;border-radius:6px;font-weight:700;font-size:.78rem;}
.btn-pay:hover{background:var(--gold-bright);}
.btn-pay:disabled{opacity:.55;cursor:default;}
.loading,.empty{padding:24px;text-align:center;color:var(--dim);}

.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.plan{background:var(--black);border:1px solid var(--line);border-radius:10px;padding:18px;}
.plan h4{color:var(--gold);margin-bottom:6px;}
.plan .price{font-size:1.3rem;font-weight:700;margin:8px 0;}
.plan p{font-size:.83rem;color:var(--dim);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);border:1px solid var(--gold);color:var(--text);padding:12px 20px;border-radius:8px;font-size:.88rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <form class="login-card" id="loginForm">
    <img src="../assets/JC+MUSIC+ENTERPRISE++LOGO+.png" alt="JC Music">
    <h1>Student Portal</h1>
    <p>Enter your email and we'll send you a secure login link.</p>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
    <button class="btn-gold" type="submit" id="loginBtn">Send Login Link</button>
    <div class="note" id="loginNote"></div>
  </form>
</div>

<!-- PORTAL -->
<div id="appView" class="wrap hidden">
  <div class="topbar">
    <img src="../assets/JC+MUSIC+ENTERPRISE++LOGO+.png" alt="JC Music">
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="who" id="who"></span>
      <button class="btn-out" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const $=(s)=>document.querySelector(s);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtMoney=(n)=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
function fmtDate(v){ if(!v)return'—'; const d=new Date(v); return isNaN(d)?'—':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function pill(s){ s=(s||'').toLowerCase(); if(['paid','succeeded'].includes(s))return'paid'; if(['void','cancelled'].includes(s))return'void'; return'due'; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),4000); }

function showLogin(){ $('#loginView').classList.remove('hidden'); $('#appView').classList.add('hidden'); }
function showApp(){ $('#loginView').classList.add('hidden'); $('#appView').classList.remove('hidden'); loadPortal(); }

/* login */
$('#loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const note=$('#loginNote'); const btn=$('#loginBtn');
  note.className='note'; note.textContent='';
  btn.disabled=true; btn.textContent='Sending…';
  try{
    const r=await fetch('/api/portal-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:$('#email').value})});
    const d=await r.json();
    if(r.ok){ note.className='note ok'; note.textContent=d.message||'Check your inbox for your login link.'; }
    else{ note.className='note err'; note.textContent=d.error||'Something went wrong.'; }
  }catch{ note.className='note err'; note.textContent='Network error. Try again.'; }
  btn.disabled=false; btn.textContent='Send Login Link';
});
$('#logoutBtn').addEventListener('click',async()=>{ await fetch('/api/portal-logout',{method:'POST'}); showLogin(); });

/* portal */
async function api(path,opts){
  const r=await fetch(path,opts);
  if(r.status===401){ showLogin(); throw new Error('unauthorized'); }
  return r.json();
}

async function loadPortal(){
  try{
    const [me,inv,pay]=await Promise.all([
      api('/api/portal/me'),
      api('/api/portal/invoices'),
      api('/api/portal/payments'),
    ]);
    $('#who').textContent=me.name||me.email||'';
    render(me,inv.invoices||[],pay.data||[]);
  }catch(e){
    if(e.message!=='unauthorized') $('#content').innerHTML='<div class="empty">Could not load your portal. Please try again.</div>';
  }
}

function render(me,invoices,payments){
  const outstanding=invoices
    .filter(i=>i.status!=='paid'&&i.status!=='void')
    .reduce((s,i)=>s+(Number(i.total)||Number(i.amountDue)||0),0);
  const collected=payments
    .filter(p=>p.status==='succeeded')
    .reduce((s,p)=>s+(Number(p.amount)||0),0);

  let html='';
  html+='<h2>Welcome back, '+esc(me.firstName||me.name||'')+'</h2>';
  html+='<div class="stat-grid">'+
    '<div class="stat"><div class="label">Outstanding Balance</div><div class="value">'+fmtMoney(outstanding)+'</div></div>'+
    '<div class="stat"><div class="label">Total Paid</div><div class="value">'+fmtMoney(collected)+'</div></div>'+
    '<div class="stat"><div class="label">Invoices</div><div class="value">'+invoices.length+'</div></div>'+
  '</div>';

  /* invoices */
  html+='<div class="panel"><h2>My Invoices</h2>';
  if(!invoices.length){ html+='<div class="empty">No invoices yet.</div>'; }
  else{
    html+='<table class="tbl"><thead><tr><th>Invoice</th><th>Status</th><th>Amount</th><th>Due</th><th></th></tr></thead><tbody>';
    invoices.forEach(i=>{
      const unpaid=i.status!=='paid'&&i.status!=='void';
      html+='<tr><td>'+esc(i.name||i.invoiceNumber||'Invoice')+'</td>'+
        '<td><span class="pill '+pill(i.status)+'">'+esc(i.status||'—')+'</span></td>'+
        '<td>'+fmtMoney(i.total!=null?i.total:i.amountDue)+'</td>'+
        '<td class="muted">'+fmtDate(i.dueDate)+'</td>'+
        '<td>'+(unpaid?'<button class="btn-pay" data-pay="'+esc(i._id)+'">Pay / Email Link</button>':'<span class="muted">Paid</span>')+'</td></tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';

  /* payment history */
  html+='<div class="panel"><h2>Payment History</h2>';
  if(!payments.length){ html+='<div class="empty">No payments recorded yet.</div>'; }
  else{
    html+='<table class="tbl"><thead><tr><th>For</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>';
    payments.forEach(p=>{
      html+='<tr><td>'+esc(p.entitySourceName||p.entityType||'Payment')+'</td>'+
        '<td>'+fmtMoney(p.amount)+'</td>'+
        '<td><span class="pill '+pill(p.status)+'">'+esc(p.status||'—')+'</span></td>'+
        '<td class="muted">'+fmtDate(p.createdAt||p.dateAdded)+'</td></tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';

  /* plans */
  html+='<div class="panel"><h2>Lesson Plans &amp; Payment Options</h2><div class="plans">'+
    '<div class="plan"><h4>Starter Foundations</h4><div class="price">$200</div><p>4 lessons · 30-day commitment · great for getting started.</p></div>'+
    '<div class="plan"><h4>6-Month Mastery</h4><div class="price">$1,397</div><p>Weekly lessons · performance syllabus · branded polo + certificate.</p></div>'+
    '<div class="plan"><h4>Annual Elite</h4><div class="price">$2,497</div><p>Year-round track · locked-in rate · VIP scheduling priority.</p></div>'+
  '</div><p class="muted" style="margin-top:14px;font-size:.84rem;">Flexible monthly payment plans available via Affirm, Klarna &amp; Afterpay. Questions about a plan? Call (609) 920-0033.</p></div>';

  $('#content').innerHTML=html;

  document.querySelectorAll('[data-pay]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      btn.disabled=true; btn.textContent='Sending…';
      try{
        const r=await fetch('/api/portal/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({invoiceId:btn.dataset.pay})});
        const d=await r.json();
        if(r.ok){ toast(d.message||'Payment link emailed to you.'); btn.textContent='Link Sent ✓'; }
        else{ toast(d.error||'Could not send link.'); btn.disabled=false; btn.textContent='Pay / Email Link'; }
      }catch{ toast('Network error.'); btn.disabled=false; btn.textContent='Pay / Email Link'; }
    });
  });
}

/* boot */
(async()=>{
  try{
    const r=await fetch('/api/portal/me');
    if(r.ok) showApp(); else showLogin();
  }catch{ showLogin(); }
  const params=new URLSearchParams(location.search);
  if(params.get('error')==='expired'){
    $('#loginNote').className='note err';
    $('#loginNote').textContent='That login link expired. Enter your email for a fresh one.';
  }
})();
</script>
</body>
</html>
